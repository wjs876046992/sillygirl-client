name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug)
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Check result
        if: always()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ APK found"
            ls -la app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK NOT found"
            ls app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            echo "=== Last 30 lines of build.log ==="
            tail -30 build.log 2>/dev/null || echo "No log"
          fi

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}
