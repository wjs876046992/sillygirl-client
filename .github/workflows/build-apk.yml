name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK (debug)
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Check APK result
        id: check
        if: always()
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
            echo "OK: $(ls -lh "$APK_PATH" | awk '{print $5}')"
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "No APK at $APK_PATH"
            ls app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            tail -30 build.log 2>/dev/null || echo "No log"
          fi

      - name: Upload build-log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK as Release
        if: steps.check.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
