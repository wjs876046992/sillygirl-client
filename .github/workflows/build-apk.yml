name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Build APK (debug)
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show build result
        if: always()
        run: |
          echo "=== BUILD STATUS ==="
          echo "Exit code: ${{ steps.build.outcome }}"
          echo ""
          echo "=== APK Check ==="
          find app/build/outputs -name "*.apk" 2>/dev/null || echo "NO APK FOUND"
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "NO apk dir"
          echo ""
          echo "=== Build Output Files ==="
          ls app/build/outputs/ 2>/dev/null || echo "No outputs"
          echo ""
          echo "=== Last 30 lines of build.log ==="
          tail -30 build.log 2>/dev/null || echo "No log"
          echo ""
          echo "=== Error lines ==="
          grep -E "^e: |FAILED|BUILD" build.log 2>/dev/null | tail -20 || echo "No errors"

      - name: Save build log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillygirl-client-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          name: v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          generate_release_notes: true
