name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Clean build
        run: ./gradlew clean --no-daemon

      - name: Build APK (debug)
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show build log
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "=== Build Log ==="
            cat build.log
            echo "=== ERROR SECTION ==="
            grep -A 5 "e: \|FAILED\|error:" build.log | tail -40 || true
          else
            echo "No build.log found"
          fi

      - name: Debug APK output
        if: always()
        run: |
          echo "=== Finding APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "None"
          ls -laR app/build/ 2>/dev/null | head -30 || echo "No build dir"

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/[^a-zA-Z0-9._-]/_/g')
          if [ -z "$VERSION" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillygirl-client-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          generate_release_notes: true
