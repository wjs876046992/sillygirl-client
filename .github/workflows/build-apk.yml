name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build APK (debug)
        id: build
        continue-on-error: true
        run: |
          set -x
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Report APK status
        id: report
        if: always()
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "=== Report APK Status ==="
          if [ -f "$APK_PATH" ]; then
            echo "APK_EXISTS=true" >> $GITHUB_OUTPUT
            echo "✅ APK found at $APK_PATH"
            ls -la "$APK_PATH"
            du -h "$APK_PATH"
          else
            echo "APK_EXISTS=false" >> $GITHUB_OUTPUT
            echo "❌ APK NOT found at $APK_PATH"
            echo "=== build/ directory contents ==="
            ls -laR app/build/ 2>/dev/null | head -50
            echo "=== Gradle task tree ==="
            ./gradlew tasks --all --no-daemon 2>/dev/null | grep -i "apk\|assemble" | head -20
            echo "=== Last 20 lines of build.log ==="
            tail -20 build.log 2>/dev/null || echo "No log"
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillygirl-client-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.report.outputs.APK_EXISTS == 'true'
        with:
          name: v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          generate_release_notes: true
