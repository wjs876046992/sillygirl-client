name: Build Native APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug)
        run: ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Debug APK output
        if: always()
        run: |
          echo "=== Finding APK files ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== build/outputs dir ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs"
          echo "=== build/apk dir ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          echo "=== build/apk/debug dir ==="
          ls -laR app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
          echo "=== build/cleanBuildCache ==="
          ls app/build/ 2>/dev/null || echo "No build dir"
          echo "=== gradle tasks ==="
          cat build.log | grep -i "apk\|assemble\|output\|BUILD" | head -30

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/[^a-zA-Z0-9._-]/_/g')
          # Fallback to short sha
          if [ -z "$VERSION" ]; then
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sillygirl-client-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          generate_release_notes: true
